name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to rebuild, for example v0.0.1'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-tag: ${{ steps.tag.outputs.release-tag }}
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            RELEASE_TAG='${{ inputs.tag }}'
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

          echo "release-tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.release-tag }}"
          REPO="${{ github.repository }}"
          if ! gh release view "$RELEASE_TAG" --repo "$REPO" &>/dev/null; then
            gh release create "$RELEASE_TAG" \
              --repo "$REPO" \
              --draft \
              --title "Desktop ${RELEASE_TAG}" \
              --notes "Release ${RELEASE_TAG}"
            echo "Created draft release for $RELEASE_TAG"
          else
            echo "Release $RELEASE_TAG already exists, skipping creation"
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_OPTIONS: --max-old-space-size=8192
      TURBO_TELEMETRY_DISABLED: '1'
      HUSKY: '0'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: refs/tags/${{ needs.prepare.outputs.release-tag }}

      - name: Setup CI
        uses: ./.github/actions/setup-ci

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-build-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'packages/**/package.json', 'apps/desktop/package.json', 'apps/desktop/plugins/**/package.json', 'apps/web/plugins/**/package.json') }}
          restore-keys: |
            turbo-build-

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          TERMLNK_SKIP_ELECTRON_POSTINSTALL: '1'
        run: pnpm install --frozen-lockfile

      - name: Prune pnpm store
        run: pnpm store prune

      - name: Build packages
        run: pnpm run build

      - name: Generate locale files
        working-directory: apps/desktop
        run: pnpm generate:locales

      - name: Build Electron (Vite)
        working-directory: apps/desktop
        run: pnpm build

      - name: Upload desktop dist
        uses: actions/upload-artifact@v7
        with:
          name: desktop-dist
          path: apps/desktop/dist/
          retention-days: 1

  mac:
    needs: [prepare, build]
    permissions:
      contents: write
      attestations: write
      id-token: write
      packages: read
    uses: ./.github/workflows/release-mac.yml
    with:
      release-tag: ${{ needs.prepare.outputs.release-tag }}
    secrets: inherit

  windows:
    needs: [prepare, build]
    permissions:
      contents: write
      attestations: write
      id-token: write
      packages: read
    uses: ./.github/workflows/release-windows.yml
    with:
      release-tag: ${{ needs.prepare.outputs.release-tag }}
    secrets: inherit

  linux:
    needs: [prepare, build]
    permissions:
      contents: write
      attestations: write
      id-token: write
      packages: read
    uses: ./.github/workflows/release-linux.yml
    with:
      release-tag: ${{ needs.prepare.outputs.release-tag }}
    secrets: inherit

  finalize:
    needs: [prepare, mac, windows, linux]
    if: >-
      !cancelled() &&
      needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (sparse — release notes + merge script)
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release-tag }}
          sparse-checkout: |
            apps/desktop/build/release-notes.md
            apps/desktop/scripts/merge-update-manifests.mjs
            docs/CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate release notes
        run: |
          RELEASE_VERSION="${{ needs.prepare.outputs.release-tag }}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          npx --yes extract-changelog-release@1.0.2 docs/CHANGELOG.md > apps/desktop/build/release-notes.md
          notes_version="$(sed -nE '1s/^#+[[:space:]]+\[?([^] (]+)\]?.*/\1/p' apps/desktop/build/release-notes.md)"
          if [ "$notes_version" != "$RELEASE_VERSION" ]; then
            echo "::error::Release notes version $notes_version does not match $RELEASE_VERSION"
            exit 1
          fi

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release-tag }}
        run: gh release edit "$RELEASE_TAG" --notes-file apps/desktop/build/release-notes.md

      - name: Download update manifests
        uses: actions/download-artifact@v4
        with:
          path: manifests
          pattern: latest-*

      - name: Merge update manifests
        run: |
          npm install --no-save --no-package-lock --silent js-yaml@4.1.1
          node apps/desktop/scripts/merge-update-manifests.mjs \
            --input-dir manifests \
            --output-dir /tmp

      - name: Upload merged manifests to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          for f in latest-mac.yml latest.yml; do
            if [ -f "/tmp/$f" ]; then
              aws s3 cp "/tmp/$f" "s3://${{ secrets.R2_BUCKET_NAME }}/desktop/$f" \
                --endpoint-url "${{ secrets.R2_ENDPOINT }}"
              echo "Uploaded $f"
            fi
          done
