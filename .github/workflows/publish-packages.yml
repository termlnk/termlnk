name: Publish Packages

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  NODE_OPTIONS: --max-old-space-size=8192
  TURBO_TELEMETRY_DISABLED: '1'
  HUSKY: '0'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Setup CI
        uses: ./.github/actions/setup-ci
        with:
          node-version: '24'

      - name: Compute package dist-tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          tag="latest"

          if [[ "$version" == *-* ]]; then
            prerelease="${version#*-}"
            tag="${prerelease%%.*}"
          fi

          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          echo "PACKAGE_DIST_TAG=$tag" >> "$GITHUB_ENV"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          TERMLNK_SKIP_ELECTRON_POSTINSTALL: '1'
        run: pnpm install --frozen-lockfile

      - name: Prune pnpm store
        run: pnpm store prune

      - name: Build packages
        run: pnpm run build

      - name: Verify package versions
        shell: bash
        run: |
          for dir in packages/*; do
            [ -f "$dir/package.json" ] || continue

            name=$(node -p "require('./${dir}/package.json').name")
            is_private=$(node -p "Boolean(require('./${dir}/package.json').private)")
            version=$(node -p "require('./${dir}/package.json').version")

            if [[ "$name" == @termlnk/* && "$is_private" != "true" && "$version" != "$PACKAGE_VERSION" ]]; then
              echo "::error title=Version mismatch::$name has version $version, expected $PACKAGE_VERSION"
              exit 1
            fi
          done

      - name: Publish @termlnk packages to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: pnpm -r --filter "./packages/*" publish --no-git-checks --tag "$PACKAGE_DIST_TAG" --report-summary
