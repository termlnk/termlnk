name: Setup CI
description: Setup pnpm and Node.js for CI.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: '24'
  registry-url:
    description: Scoped registry URL for @termlnk packages.
    required: false
    default: 'https://npm.pkg.github.com'
  scope:
    description: Package scope that should be resolved from the scoped registry.
    required: false
    default: '@termlnk'
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}
        always-auth: true
