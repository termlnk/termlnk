[package]
name = "uniffi-russh"
version = "0.1.0"
edition = "2021"

# Runtime + FFI + SSH deps
[dependencies]
# UniFFI runtime with the tokio feature so async exports surface as JS promises.
uniffi = { workspace = true, features = ["tokio"] }

# FFI-safe error enum derive.
thiserror = "1.0.64"

# Tokio runtime + IO bits used by russh + the shell ring buffer + SFTP transfers.
# `fs` enables tokio::fs::File for local read/write in upload/download paths.
tokio = { version = "1.47.1", features = ["rt-multi-thread", "macros", "time", "net", "sync", "io-util", "fs"] }

# Async ecosystem utilities pulled in transitively; kept explicit so version
# bumps land in this file rather than via russh.
bytes = "1.10.1"
futures = "0.3.31"
base64 = "0.22"
ed25519-dalek = "2"

# SSH client. russh's default features pull in aws-lc (needs CMake) — we
# stay on `ring` to keep the Android NDK build path clean. `flate2` enables
# SSH compression negotiation; `rsa` enables the RSA key types.
russh = { version = "0.60.1", default-features = false, features = ["ring", "flate2", "rsa"] }
# SFTP subsystem on top of russh — shares the channel via `channel.into_stream()`.
russh-sftp = "2"

# Secure RNG for in-app key generation. Tracks russh 0.60+'s internal
# rand-core 0.10 so `rand::rng()` (ThreadRng) satisfies russh's
# `CryptoRng` bound via the `Infallible` blanket impl.
rand = "0.10"

# Lazy statics used by the shell session.
once_cell = "1.21.3"

# Async trait helper; kept as a transitive guard.
async-trait = "0.1"

[build-dependencies]
# Compile-time bindings codegen.
uniffi = { workspace = true, features = ["build"] }

[lib]
# - cdylib   : C-compatible dynamic library (Android/iOS JSI loader target)
# - staticlib: Static archive (iOS static link via xcframework)
# - lib      : Normal rlib (unit tests, internal usage)
crate-type = ["cdylib", "staticlib", "lib"]
