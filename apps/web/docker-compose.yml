services:
  termlnk-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: termlnk-web:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      TERMLNK_MASTER_PASSWORD: ${TERMLNK_MASTER_PASSWORD:?TERMLNK_MASTER_PASSWORD must be set}
      TERMLNK_WEB_HOST: "0.0.0.0"
      TERMLNK_WEB_PORT: "3000"
    volumes:
      - vault:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/__termlnk-web/status >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  vault:
