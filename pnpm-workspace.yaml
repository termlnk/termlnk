packages:
  - internal/*
  - packages/*
  - extensions/*
  - apps/desktop
  - apps/desktop/main
  - apps/desktop/renderer
  - apps/desktop/plugins/*
  - apps/web/server
  - apps/web/renderer
  - apps/web/plugins/*
  - apps/mobile
  - apps/mobile/packages/*
  - apps/mobile/plugins/*

ignoredBuiltDependencies:
  - javascript-obfuscator

onlyBuiltDependencies:
  - '@swc/core'
  - '@tailwindcss/oxide'
  - electron
  - esbuild
  - fs-xattr
  - macos-alias
  - protobufjs
  - react-native-libsodium
  - sharp
  - uniffi-bindgen-react-native

overrides:
  '@types/react': ^19.2.15
  '@types/react-dom': ^19.2.3
  react: ^19.2.6
  react-dom: ^19.2.6
  # electron pinned to 41.x: better-sqlite3 ships no Electron 42 prebuild and
  # fails to build against V8 14.x (v8::External::New signature changed)
  electron: 41.7.1
  tar: ^7.5.13
  undici: ^8.3.0
  file-type: ^22.0.0
  '@tootallnate/once': ^3.0.1
  tmp: ^0.2.6
  defu: ^6.1.6
  lodash: ^4.18.1
  lightningcss: 1.30.1
  # Dependabot security fixes (transitive)
  '@xmldom/xmldom': ^0.8.13
  protobufjs: ^7.5.6
  '@protobufjs/utf8': ^1.1.1
  basic-ftp: ^5.3.1
  dompurify: ^3.4.0
  hono: ^4.12.18
  follow-redirects: ^1.16.0
  '@hono/node-server': ^1.19.13
  fast-xml-parser: ^5.7.0
  fast-xml-builder: ^1.1.7
  fast-uri: ^3.1.2
  mermaid: ^11.15.0
  ip-address: ^10.1.1
  postcss: ^8.5.15
  js-cookie: ^3.0.7
  qs: ^6.15.2
  # scoped to the vulnerable 5.0.x line; other majors (1.x/2.x) stay untouched
  'brace-expansion@>=5.0.0 <5.0.6': ^5.0.6
  # uuid GHSA-w5hq-g745-h8pq (v3/v5/v6 buf bounds): patched only in >=11.1.1.
  # uuid 7.0.3 (expo>xcode, mobile build) and 8.3.2 (drizzle>@types/mssql>tedious>
  # @azure/msal-node, optional mssql driver) are left as-is: a 4-major bump on these
  # transitive deps risks breakage, both consumers use v4 (not the affected v3/v5/v6
  # +buf path), and neither is reachable from the desktop app (sqlite, not mssql).
  'uuid@>=11.0.0 <11.1.1': ^11.1.1
  'uuid@>=13.0.0 <13.0.1': ^13.0.1
