packages:
  - internal/*
  - packages/*
  - extensions/*
  - apps/desktop
  - apps/desktop/main
  - apps/desktop/renderer
  - apps/desktop/plugins/*
  - apps/web/server
  - apps/web/renderer
  - apps/web/plugins/*
  - apps/mobile
  - apps/mobile/plugins/*

ignoredBuiltDependencies:
  - javascript-obfuscator

onlyBuiltDependencies:
  - '@swc/core'
  - '@tailwindcss/oxide'
  - electron
  - esbuild
  - fs-xattr
  - macos-alias
  - protobufjs
  - react-native-libsodium
  - sharp

overrides:
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  react: ^19.2.6
  react-dom: ^19.2.6
  electron: 41.5.0
  tar: ^7.5.13
  undici: ^8.2.0
  file-type: ^22.0.0
  '@tootallnate/once': ^3.0.1
  tmp: ^0.2.5
  defu: ^6.1.6
  lodash: ^4.18.1
  # Dependabot security fixes (transitive)
  '@xmldom/xmldom': ^0.8.13
  protobufjs: ^7.5.5
  basic-ftp: ^5.3.0
  dompurify: ^3.4.0
  hono: ^4.12.14
  follow-redirects: ^1.16.0
  '@hono/node-server': ^1.19.13
  fast-xml-parser: ^5.7.0
